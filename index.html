    <style>
      /* Reactが起動する前に表示される「0秒目」のスタイル */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.8s ease-in-out;
      }
      .loader-content {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .loader-fugu-container {
        width: 180px;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: -1.8rem;
      }
      .loader-fugu-static {
        width: 130px;
        height: auto;
        opacity: 0.3;
        filter: grayscale(100%) brightness(30%);
      }
      .loader-japanese-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
      }
      .loader-wave-container {
        width: 140px;
        position: relative;
      }
      .loader-wave-svg {
        width: 100%;
        height: auto;
      }
      .loader-wave-bg {
        stroke: rgba(175, 139, 80, 0.2);
        stroke-width: 1;
      }
      .loader-text-wrapper {
        color: #af8b50;
        display: flex;
        align-items: baseline;
        gap: 2px;
        font-family: "Shippori Mincho", serif;
        opacity: 0.3; /* ふぐの明るさに合わせて暗くする */
      }
      .loader-number {
        font-size: 1.4rem;
        letter-spacing: 0.1em;
      }
      .loader-unit {
        font-size: 0.7rem;
        opacity: 0.7;
      }
      /* スマホ対応 */
      @media (max-width: 768px) {
        .loader-fugu-container { width: 160px; height: 150px; }
        .loader-fugu-static { width: 120px; }
        .loader-number { font-size: 1.2rem; }
      }
    </style>
